<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Торговый журнал</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d0d0d;--surface:#161616;--surface2:#1f1f1f;--border:rgba(255,255,255,0.07);
    --border-md:rgba(255,255,255,0.13);--text:#e8e7e0;--text2:#9a9992;--text3:#5c5b56;
    --accent:#27b213;--accent-light:#0d2408;--accent-dark:#7de86a;
    --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:linear-gradient(rgba(255,255,255,0.09) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.09) 1px,transparent 1px);background-size:40px 40px;}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text);text-decoration:none;}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;padding:6px 8px;font-size:16px;line-height:1;transition:background .15s;}
  .theme-btn:hover{background:var(--border);}
  .sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
  .sync-dot.ok{background:var(--accent);}
  .sync-dot.err{background:#D85A30;}
  .container{max-width:920px;margin:0 auto;padding:2rem 1.5rem;}
  .tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem;}
  .tab{flex:1;padding:9px 12px;border:none;background:transparent;color:var(--text2);font-family:'Manrope',sans-serif;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,color .15s;}
  .tab:hover:not(.active){background:var(--surface2);color:var(--text);}
  .tab.active{background:var(--accent);color:#fff;}
  .section{display:none;}.section.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
  input,select,textarea{font-family:'Manrope',sans-serif;font-size:14px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;outline:none;transition:border-color .15s,background .15s;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(39,178,19,0.15);}
  textarea{resize:vertical;min-height:72px;}
  .emotion-grid{display:flex;gap:7px;flex-wrap:wrap;}
  .emotion-btn{padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);background:#2a2a2a;font-family:'Manrope',sans-serif;font-size:13px;cursor:pointer;color:#c8c7c0;transition:all .15s;}
  .emotion-btn:hover{border-color:var(--accent);color:var(--text);}
  .emotion-btn.selected{background:#0d2408;border-color:#27b213;color:#7de86a;font-weight:600;}
  .submit-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;margin-top:1.25rem;}
  .submit-btn:hover{background:var(--accent-dark);}
  .submit-btn:active{transform:scale(0.99);}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;}
  .alert{padding:11px 15px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;display:none;align-items:center;gap:8px;}
  .alert-success{background:var(--accent-light);color:var(--accent-dark);border:1px solid var(--accent);}
  .alert-error{background:#fcebeb;color:#791f1f;border:1px solid #f09595;}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-weight:600;}
  .stat-val{font-size:22px;font-weight:600;color:var(--text);font-family:'IBM Plex Mono',monospace;}
  .stat-val.pos{color:#27b213;}.stat-val.neg{color:#993C1D;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}
  th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);}
  td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  td.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;}
  .badge-long{background:#0d2408;color:#1a4d0a;}.badge-short{background:#faece7;color:#712b13;}
  .badge-win{background:#0d2408;color:#7de86a;}.badge-loss{background:#fcebeb;color:#791f1f;}.badge-be{background:#f1efe8;color:#444441;}
  [data-theme="dark"] .badge-long{background:#0d2408;color:#7de86a;}
  [data-theme="dark"] .badge-short{background:#2e1209;color:#f0997b;}
  [data-theme="dark"] .badge-win{background:#0d2408;color:#7de86a;}
  [data-theme="dark"] .badge-loss{background:#2e0a0a;color:#f09595;}
  [data-theme="dark"] .badge-be{background:#2c2c2a;color:#b4b2a9;}
  .pnl-pos{color:#27b213;font-weight:600;font-family:'IBM Plex Mono',monospace;}
  .pnl-neg{color:#993C1D;font-weight:600;font-family:'IBM Plex Mono',monospace;}
  .pnl-be{color:var(--text2);font-family:'IBM Plex Mono',monospace;}
  .delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:4px 7px;border-radius:5px;transition:all .15s;}
  .delete-btn:hover{color:#D85A30;background:#faece7;}
  .filter-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
  .filter-row select{width:auto;flex:none;font-size:13px;}
  .trade-count{font-size:13px;color:var(--text3);margin-left:auto;}
  .chart-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1rem;}
  .chart-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
  .bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px;}
  .bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:5px;height:100%;justify-content:flex-end;}
  .bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
  .bar.win-bar{background:var(--accent);}.bar.loss-bar{background:#D85A30;}
  .bar-label{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .emotion-chart{display:flex;gap:10px;flex-wrap:wrap;}
  .emotion-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
  .emotion-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);}
  .empty-state i{font-size:36px;display:block;margin-bottom:10px;}
  .loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:4px 0;}
  .cal-cell{min-height:60px;border-radius:6px;padding:6px;cursor:default;position:relative;background:var(--surface2);border:1px solid var(--border);transition:transform .1s;}
  .cal-cell.has-trades{cursor:pointer;}.cal-cell.has-trades:hover{transform:scale(1.03);}
  .cal-cell.win-day{background:#0d2408;border-color:#3a7a2a;}
  .cal-cell.loss-day{background:#fce8e8;border-color:#f0a0a0;}
  .cal-cell.today{box-shadow:0 0 0 2px var(--accent);}
  .cal-cell.empty{background:transparent;border-color:transparent;}
  [data-theme="dark"] .cal-cell.win-day{background:#0d2408;border-color:#3a7a2a;}
  [data-theme="dark"] .cal-cell.loss-day{background:#2e0e0e;border-color:#7a2a2a;}
  .cal-day-num{font-size:12px;font-weight:600;color:var(--text2);}
  .cal-pnl{font-size:11px;font-weight:600;font-family:"IBM Plex Mono",monospace;margin-top:2px;}
  .cal-pnl.pos{color:#27b213;}.cal-pnl.neg{color:#993C1D;}
  .cal-count{font-size:10px;color:var(--text3);margin-top:1px;}
  /* DIARY CSS */
  .diary-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
  .diary-add-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
  .diary-add-btn:hover{background:var(--accent-dark);}
  .diary-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);}
  .diary-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .diary-save-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
  .diary-save-btn:hover{background:var(--accent-dark);}
  .diary-cancel-btn{padding:10px 16px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-size:13px;cursor:pointer;}
  .diary-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:10px;box-shadow:var(--shadow);}
  .diary-entry-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;}
  .diary-entry-date{font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .diary-delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:4px 7px;border-radius:5px;flex-shrink:0;transition:all .15s;}
  .diary-delete-btn:hover{color:#D85A30;background:#faece7;}
  .diary-field-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
  .diary-field-val{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;}
  .diary-entry-img{max-width:100%;border-radius:var(--radius);border:1px solid var(--border);margin-top:12px;cursor:pointer;transition:opacity .15s;}
  .diary-entry-img:hover{opacity:0.85;}
  .img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;}
  .img-modal.open{display:flex;}
  .img-modal img{max-width:90vw;max-height:90vh;border-radius:var(--radius);}
  #d-drop-zone:hover{border-color:var(--accent);color:var(--accent);}
  #d-drop-zone.dragover{border-color:var(--accent);background:var(--accent-light);}
  .diary-empty{text-align:center;padding:3rem 1rem;color:var(--text3);}
  .diary-empty i{font-size:36px;display:block;margin-bottom:10px;}
  @media(max-width:600px){
    .stats-grid{grid-template-columns:repeat(2,1fr);}
    .form-grid{grid-template-columns:1fr;}
    .form-group.full{grid-column:1;}
    .app-header{padding:0 1rem;}
    .container{padding:1rem;}
    .tab span{display:none;}
  }
</style>
</head>

<div class="container">
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab('diary')"><i class="ti ti-plus" aria-hidden="true"></i> <span>Новая запись</span></button>
    <button class="tab" onclick="switchTab('log')"><i class="ti ti-list" aria-hidden="true"></i> <span>Журнал</span></button>
    <button class="tab" onclick="switchTab('stats')"><i class="ti ti-chart-bar" aria-hidden="true"></i> <span>Аналитика</span></button>
    <button class="tab" onclick="switchTab('calendar')"><i class="ti ti-calendar" aria-hidden="true"></i> <span>Календарь</span></button>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="section">
    <div id="alert-ok" class="alert alert-success" role="alert"><i class="ti ti-circle-check"></i> Сделка сохранена!</div>
    <div id="alert-err" class="alert alert-error" role="alert"><i class="ti ti-alert-circle"></i> <span id="err-text">Ошибка сохранения</span></div>
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label for="f-date">Дата</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label for="f-pair">Валютная пара *</label>
          <select id="f-pair">
            <option value="">— выбрать —</option>
            <option>EUR/USD</option>
            <option>GBP/USD</option>
            <option>USD/CHF</option>
            <option>AUD/USD</option>
            <option>NZD/USD</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-dir">Направление *</label>
          <select id="f-dir">
            <option value="">— выбрать —</option>
            <option value="long">Long (покупка)</option>
            <option value="short">Short (продажа)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-tf">Таймфрейм</label>
          <select id="f-tf">
            <option value="">— выбрать —</option>
            <option>M1</option><option>M5</option><option>M15</option>
            <option>M30</option><option>H1</option><option>H4</option><option>D1</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-entry">Цена входа</label>
          <input type="number" id="f-entry" placeholder="1.08500" step="0.00001" />
        </div>
        <div class="form-group">
          <label for="f-exit">Цена выхода</label>
          <input type="number" id="f-exit" placeholder="1.09000" step="0.00001" />
        </div>
        <div class="form-group">
          <label for="f-sl">Стоп-лосс</label>
          <input type="number" id="f-sl" placeholder="1.08200" step="0.00001" />
        </div>
        <div class="form-group">
          <label for="f-tp">Тейк-профит</label>
          <input type="number" id="f-tp" placeholder="1.09200" step="0.00001" />
        </div>
        <div class="form-group">
          <label for="f-size">Размер позиции (лоты)</label>
          <input type="number" id="f-size" placeholder="0.10" step="0.01" />
        </div>
        <div class="form-group">
          <label for="f-pnl">Результат P&amp;L ($) *</label>
          <input type="text" id="f-pnl" placeholder="+50 или -30" inputmode="decimal" />
        </div>
        <div class="form-group full">
          <label>Причина входа</label>
          <textarea id="f-reason" placeholder="Пробой уровня, паттерн, подтверждение объёма..."></textarea>
        </div>
        <div class="form-group full">
          <label>Эмоциональное состояние</label>
          <div class="emotion-grid">
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="спокоен">◎ Спокоен</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="уверен">◈ Уверен</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="нетерпелив">◇ Нетерпелив</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="страх">◻ Страх</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="жадность">◆ Жадность</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="fomo">▲ FOMO</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="месть">✕ Месть рынку</button>
            <button class="emotion-btn" onclick="selectEmotion(this)" data-val="усталость">◌ Усталость</button>
          </div>
        </div>
        <div class="form-group full">
          <label>Заметки / ошибки / выводы</label>
          <textarea id="f-notes" placeholder="Что прошло хорошо? Что можно было сделать лучше?"></textarea>
        </div>
      </div>
      <button class="submit-btn" id="save-btn" onclick="saveTrade()">
        <i class="ti ti-device-floppy"></i> Сохранить сделку
      </button>
    </div>
  </div>

  <!-- LOG -->
  <div id="tab-log" class="section">
    <div class="filter-row">
      <select id="filter-dir" onchange="renderLog()">

<script>
const SUPABASE_URL = 'https://igjjtnpvnhmmhgtsqdbj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XG2vAGj2Efd_HxGXc33QTg_iJA00W99';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let trades = [];
let selectedEmotion = '';

const todayStr = () => new Date().toISOString().slice(0,10);
document.getElementById('f-date').value = todayStr();
loadDiary().then(() => renderDiary());



function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(state === 'ok') { dot.className='sync-dot ok'; lbl.textContent='синхронизировано'; }
  else if(state === 'err') { dot.className='sync-dot err'; lbl.textContent='ошибка связи'; }
  else { dot.className='sync-dot'; lbl.textContent='подключение...'; }
}

async function loadTrades() {
  const { data, error } = await db.from('Trade 2').select('*').order('created_at', { ascending: false });
  if(error) { setSyncStatus('err'); return; }
  trades = data || [];
  setSyncStatus('ok');
}

async function init() {
  await loadTrades();
  renderLog();
}
init();

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['diary','log','stats','calendar'][i]===t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='log') renderLog();
  if(t==='stats') renderStats();
  if(t==='calendar') renderCalendar();
  if(t==='diary') { loadDiary().then(() => renderDiary()); }
}

function selectEmotion(btn) {
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEmotion = btn.dataset.val;
}

function showAlert(id, ms=2800) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  setTimeout(() => el.style.display = 'none', ms);
}

async function saveTrade() {
  const pair = document.getElementById('f-pair').value.trim();
  const dir = document.getElementById('f-dir').value;
  const pnlRaw = document.getElementById('f-pnl').value;
  const pnl = parseFloat(pnlRaw);
  if(!pair || !dir || pnlRaw === '' || isNaN(pnl)) {
    document.getElementById('err-text').textContent = 'Заполни обязательные поля: пара, направление, P&L';
    showAlert('alert-err');
    return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Сохранение...';

  const record = {
    date: document.getElementById('f-date').value || todayStr(),
    pair, dir,
    tf: document.getElementById('f-tf').value || null,
    entry_price: document.getElementById('f-entry').value || null,
    exit_price: document.getElementById('f-exit').value || null,
    stop_loss: document.getElementById('f-sl').value || null,
    take_profit: document.getElementById('f-tp').value || null,
    lot_size: document.getElementById('f-size').value || null,
    pnl,
    reason: document.getElementById('f-reason').value || null,
    emotion: selectedEmotion || null,
    notes: document.getElementById('f-notes').value || null,
    result: pnl > 0 ? 'win' : pnl < 0 ? 'loss' : 'be'
  };

  const { error } = await db.from('Trade 2').insert([record]);
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-device-floppy"></i> Сохранить сделку';

  if(error) {
    document.getElementById('err-text').textContent = 'Ошибка: ' + error.message;
    showAlert('alert-err');
    setSyncStatus('err');
    return;
  }

  showAlert('alert-ok');
  setSyncStatus('ok');
  ['f-pair','f-entry','f-exit','f-sl','f-tp','f-size','f-pnl','f-reason','f-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-dir').value='';
  document.getElementById('f-tf').value='';
  document.querySelectorAll('.emotion-btn').forEach(b=>b.classList.remove('selected'));
  selectedEmotion='';
  document.getElementById('f-date').value=todayStr();
  await loadTrades();
}

async function deleteTrade(id) {
  if(!confirm('Удалить сделку?')) return;
  const { error } = await db.from('Trade 2').delete().eq('id', id);
  if(error) { alert('Ошибка удаления: '+error.message); return; }
  await loadTrades();
  renderLog();
}

function renderLog() {
  const fd = document.getElementById('filter-dir').value;
  const fr = document.getElementById('filter-result').value;
  const ffrom = document.getElementById('filter-from').value;
  const fto = document.getElementById('filter-to').value;
  const filtered = trades.filter(t => {
    if(fd && t.dir!==fd) return false;
    if(fr && t.result!==fr) return false;
    if(ffrom && t.date && t.date.slice(0,10) < ffrom) return false;
    if(fto && t.date && t.date.slice(0,10) > fto) return false;
    return true;
  });
  document.getElementById('log-count').textContent = filtered.length+' сделок';
  if(!filtered.length) {
    document.getElementById('log-body').innerHTML='<div class="empty-state"><i class="ti ti-database-off"></i>Сделок пока нет.<br>Добавь первую во вкладке «Новая сделка»</div>';
    return;
  }
  let html='<table><thead><tr><th>Дата</th><th>Пара</th><th>Тип</th><th>ТФ</th><th>Вход</th><th>Выход</th><th>Объём</th><th>P&L</th><th>Итог</th><th>Эмоция</th><th></th></tr></thead><tbody>';
  filtered.forEach(t => {
    const pnl=parseFloat(t.pnl);
    const pnlStr=(pnl>=0?'+':'')+pnl.toFixed(2)+'$';
    const pnlCls=pnl>0?'pnl-pos':pnl<0?'pnl-neg':'pnl-be';
    const dirBadge=`<span class="badge badge-${t.dir}">${t.dir==='long'?'Long':'Short'}</span>`;
    const resBadge=`<span class="badge badge-${t.result}">${t.result==='win'?'Прибыль':t.result==='loss'?'Убыток':'Безубыток'}</span>`;
    html+=`<tr>
      <td class="mono">${t.date||''}</td>
      <td style="font-weight:600">${t.pair}</td>
      <td>${dirBadge}</td>
      <td class="mono" style="color:var(--text2)">${t.tf||'—'}</td>
      <td class="mono">${t.entry_price||'—'}</td>
      <td class="mono">${t.exit_price||'—'}</td>
      <td class="mono" style="color:var(--text2)">${t.lot_size?t.lot_size+' л':'—'}</td>
      <td class="${pnlCls}">${pnlStr}</td>
      <td>${resBadge}</td>
      <td style="color:var(--text2);font-size:12px">${t.emotion||'—'}</td>
      <td><button class="delete-btn" onclick="deleteTrade(${t.id})" title="Удалить"><i class="ti ti-trash"></i></button></td>
    </tr>`;
    if(t.reason||t.notes) {
      html+=`<tr><td colspan="11" style="padding:4px 12px 12px;font-size:12px;color:var(--text2)">
        ${t.reason?'<b>Вход:</b> '+t.reason+(t.notes?' &nbsp;·&nbsp; ':''):''}
        ${t.notes?'<b>Заметки:</b> '+t.notes:''}
      </td></tr>`;
    }
  });
  html+='</tbody></table>';
  document.getElementById('log-body').innerHTML=html;
}

function renderStats() {
  if(!trades.length) {
    document.getElementById('stats-cards').innerHTML='';
    document.getElementById('stats-charts').innerHTML='<div class="empty-state"><i class="ti ti-chart-bar"></i>Нет данных для аналитики</div>';
    document.getElementById('emotion-breakdown').innerHTML='';
    return;
  }
  const wins=trades.filter(t=>t.result==='win');
  const losses=trades.filter(t=>t.result==='loss');
  const totalPnl=trades.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const wr=Math.round(wins.length/trades.length*100);
  const avgWin=wins.length?wins.reduce((s,t)=>s+parseFloat(t.pnl),0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0)/losses.length):0;
  const rr=avgLoss>0?(avgWin/avgLoss).toFixed(2):'—';
  const sign=totalPnl>=0?'+':'';
  document.getElementById('stats-cards').innerHTML=`
    <div class="stat-card"><div class="stat-label">Всего сделок</div><div class="stat-val">${trades.length}</div></div>
    <div class="stat-card"><div class="stat-label">Винрейт</div><div class="stat-val ${wr>=50?'pos':'neg'}">${wr}%</div></div>
    <div class="stat-card"><div class="stat-label">Общий P&L</div><div class="stat-val ${totalPnl>=0?'pos':'neg'}">${sign}${totalPnl.toFixed(0)}$</div></div>
    <div class="stat-card"><div class="stat-label">Ср. R:R</div><div class="stat-val">${rr}</div></div>`;
  const last12=[...trades].reverse().slice(-12);
  const maxAbs=Math.max(...last12.map(t=>Math.abs(parseFloat(t.pnl))),1);
  const barsHtml=last12.map(t=>{
    const p=parseFloat(t.pnl);
    const h=Math.max(4,Math.round(Math.abs(p)/maxAbs*76));
    return `<div class="bar-wrap"><div class="bar ${p>=0?'win-bar':'loss-bar'}" style="height:${h}px" title="${(p>=0?'+':'')+p.toFixed(0)}$"></div><div class="bar-label">${t.pair.slice(0,3)}</div></div>`;
  }).join('');
  document.getElementById('stats-charts').innerHTML=`
    <div class="chart-container">
      <div class="chart-title">Последние ${last12.length} сделок — P&L</div>
      <div class="bar-chart">${barsHtml}</div>
    </div>`;
  const ec={};
  trades.forEach(t=>{if(t.emotion)ec[t.emotion]=(ec[t.emotion]||0)+1;});
  const eColors={спокоен:'#27b213',уверен:'#378ADD',нетерпелив:'#EF9F27',страх:'#D4537E',жадность:'#D85A30',fomo:'#7F77DD',месть:'#E24B4A',усталость:'#888780'};
  const eLabels={спокоен:'◎ Спокоен',уверен:'◈ Уверен',нетерпелив:'◇ Нетерпелив',страх:'◻ Страх',жадность:'◆ Жадность',fomo:'▲ FOMO',месть:'😤 Месть',усталость:'◌ Усталость'};
  const emEntries=Object.entries(ec).sort((a,b)=>b[1]-a[1]);
  document.getElementById('emotion-breakdown').innerHTML=emEntries.length?`
    <div class="chart-container">
      <div class="chart-title">Эмоции при входе в сделку</div>
      <div class="emotion-chart">${emEntries.map(([k,v])=>`<div class="emotion-stat"><div class="emotion-dot" style="background:${eColors[k]||'#888'}"></div>${eLabels[k]||k}: <b>${v}</b></div>`).join('')}</div>
    </div>`:'';
}

function clearDateFilter() {
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value = '';
  renderLog();
}

// Calendar
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar() {
  document.getElementById('cal-title').textContent = MONTHS_RU[calMonth] + ' ' + calYear;
  // build day map
  const dayMap = {};
  trades.forEach(t => {
    if(!t.date) return;
    const d = t.date.slice(0,10);
    if(!dayMap[d]) dayMap[d] = {pnl:0, count:0};
    dayMap[d].pnl += parseFloat(t.pnl);
    dayMap[d].count++;
  });

  const today = new Date().toISOString().slice(0,10);
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay(); // 0=sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to mon=0
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  let html = '<div class="cal-grid">';
  DAYS_RU.forEach(d => html += `<div class="cal-dow">${d}</div>`);

  for(let i=0;i<startDow;i++) html += '<div class="cal-cell empty"></div>';

  for(let d=1;d<=daysInMonth;d++) {
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const info = dayMap[dateStr];
    let cls = 'cal-cell';
    if(info) { cls += info.pnl>=0?' win-day':' loss-day'; cls+=' has-trades'; }
    if(dateStr===today) cls+=' today';
    const clickAttr = info ? `onclick="showDayDetail('${dateStr}')"` : '';
    let inner = `<div class="cal-day-num">${d}</div>`;
    if(info) {
      const sign = info.pnl>=0?'+':'';
      inner += `<div class="cal-pnl ${info.pnl>=0?'pos':'neg'}">${sign}${info.pnl.toFixed(0)}$</div>`;
      inner += `<div class="cal-count">${info.count} сд.</div>`;
    }
    html += `<div class="${cls}" ${clickAttr}>${inner}</div>`;
  }
  html += '</div>';
  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-day-detail').innerHTML = '';
}

function showDayDetail(dateStr) {
  const dayTrades = trades.filter(t => t.date && t.date.slice(0,10) === dateStr);
  if(!dayTrades.length) return;
  const totalPnl = dayTrades.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const sign = totalPnl>=0?'+':'';
  let html = `<div class="card" style="margin-top:1rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:14px;font-weight:600;">${dateStr}</div>
      <div style="font-size:14px;font-weight:600;font-family:'IBM Plex Mono',monospace;" class="${totalPnl>=0?'pnl-pos':'pnl-neg'}">${sign}${totalPnl.toFixed(2)}$</div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);">Пара</th>
        <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);">Тип</th>
        <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);">Объём</th>
        <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);">P&L</th>
        <th style="text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);">Итог</th>
      </tr></thead><tbody>`;
  dayTrades.forEach(t => {
    const pnl=parseFloat(t.pnl);
    const pnlStr=(pnl>=0?'+':'')+pnl.toFixed(2)+'$';
    const pnlCls=pnl>0?'pnl-pos':pnl<0?'pnl-neg':'pnl-be';
    const dirBadge=`<span class="badge badge-${t.dir}">${t.dir==='long'?'Long':'Short'}</span>`;
    const resBadge=`<span class="badge badge-${t.result}">${t.result==='win'?'Прибыль':t.result==='loss'?'Убыток':'Безубыток'}</span>`;
    html += `<tr>
      <td style="padding:10px;border-bottom:1px solid var(--border);font-weight:600;">${t.pair}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border);">${dirBadge}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:12px;">${t.lot_size?t.lot_size+' л':'—'}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border);" class="${pnlCls}">${pnlStr}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border);">${resBadge}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('cal-day-detail').innerHTML = html;
}

// ========== DIARY ==========
let diaryEntries = [];
let currentImageFile = null;
let selectedDiaryEmotion = "";

function selectDiaryEmotion(btn) {
  document.querySelectorAll("#diary-form .emotion-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedDiaryEmotion = btn.dataset.val;
}

async function loadDiary() {
  const { data, error } = await db.from('diary').select('*').order('created_at', { ascending: false });
  if(error) { console.error('Diary load error:', error); return; }
  diaryEntries = data || [];
}

function toggleDiaryForm() {
  const f = document.getElementById('diary-form');
  const isHidden = f.style.display === 'none' || f.style.display === '';
  f.style.display = isHidden ? 'block' : 'none';
  if(isHidden) {
    document.getElementById('d-date').value = new Date().toISOString().slice(0,10);
    ['d-pair','d-risk','d-profit-target','d-entry-desc','d-sl','d-tp','d-result','d-emotion-before','d-emotion-after','d-comments','d-reason','d-notes'].forEach(id => {
      const el = document.getElementById(id); if(el) el.value = '';
    });
    clearDiaryImage();
    selectedDiaryEmotion = '';
    document.querySelectorAll('#diary-form .emotion-btn').forEach(b => b.classList.remove('selected'));
    setTimeout(initDiaryDrop, 50);
  }
}

function handleDiaryImageUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  currentImageFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('d-img-preview-img').src = e.target.result;
    document.getElementById('d-img-preview').style.display = 'block';
    document.getElementById('d-drop-zone').style.display = 'none';
    document.getElementById('d-upload-status').textContent = '📎 ' + file.name;
  };
  reader.readAsDataURL(file);
}

function clearDiaryImage() {
  currentImageFile = null;
  const preview = document.getElementById('d-img-preview');
  const zone = document.getElementById('d-drop-zone');
  const status = document.getElementById('d-upload-status');
  if(preview) preview.style.display = 'none';
  if(zone) zone.style.display = 'block';
  if(status) status.textContent = '';
  const input = document.getElementById('d-img-input');
  if(input) input.value = '';
}

async function uploadScreenshot(file) {
  const ext = file.name.split('.').pop();
  const fileName = 'diary_' + Date.now() + '.' + ext;
  const { error } = await db.storage.from('screenshots').upload(fileName, file, { upsert: true });
  if(error) { console.error('Upload error:', error); return null; }
  const { data: urlData } = db.storage.from('screenshots').getPublicUrl(fileName);
  return urlData.publicUrl;
}

async function saveDiaryEntry() {
  const pair = document.getElementById('d-pair').value;
  const entryDesc = document.getElementById('d-entry-desc').value.trim();
  const comments = document.getElementById('d-comments').value.trim();
  if(!pair && !entryDesc && !comments) { alert('Заполни хотя бы пару или описание'); return; }
  const btn = document.getElementById('d-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Сохранение...';
  let screenshotUrl = null;
  if(currentImageFile) {
    document.getElementById('d-upload-status').textContent = '⬆️ Загружаю скриншот...';
    screenshotUrl = await uploadScreenshot(currentImageFile);
    document.getElementById('d-upload-status').textContent = screenshotUrl ? '✅ Загружен' : '❌ Ошибка';
  }
  const record = {
    date: document.getElementById('d-date').value || new Date().toISOString().slice(0,10),
    pair: pair || null,
    risk: document.getElementById('d-risk').value || null,
    profit_target: document.getElementById('d-profit-target').value || null,
    entry_desc: entryDesc || null,
    stop_loss: document.getElementById('d-sl').value || null,
    take_profit: document.getElementById('d-tp').value || null,
    result: document.getElementById('d-result').value || null,
    emotion_before: document.getElementById('d-emotion-before').value || null,
    emotion_after: document.getElementById('d-emotion-after').value || null,
    comments: comments || null,
    reason: document.getElementById('d-reason').value || null,
    emotion: selectedDiaryEmotion || null,
    notes: document.getElementById('d-notes').value || null,
    screenshot_url: screenshotUrl
  };
  const { error } = await db.from('diary').insert([record]);
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-device-floppy"></i> Сохранить';
  if(error) { alert('Ошибка: ' + error.message); return; }
  toggleDiaryForm();
  await loadDiary();
  renderDiary();
}

async function deleteDiaryEntry(id) {
  if(!confirm('Удалить запись?')) return;
  await db.from('diary').delete().eq('id', id);
  await loadDiary();
  renderDiary();
}

function renderDiary() {
  const container = document.getElementById('diary-entries');
  if(!container) return;
  if(!diaryEntries.length) {
    container.innerHTML = '<div class="diary-empty"><i class="ti ti-notebook"></i>Записей пока нет.<br>Нажми «Добавить запись» чтобы начать.</div>';
    return;
  }
  container.innerHTML = diaryEntries.map(e => {
    const resultNum = parseFloat(e.result);
    const resultColor = !isNaN(resultNum) ? (resultNum >= 0 ? '#0F6E56' : '#993C1D') : 'var(--text)';
    const imgClick = e.screenshot_url ? `onclick="document.getElementById('img-modal-img').src='${e.screenshot_url}';document.getElementById('img-modal').classList.add('open')"` : '';
    return `<div class="diary-entry">
      <div class="diary-entry-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="diary-entry-date">${e.date||''}</span>
          ${e.pair?`<span class="badge badge-be">${e.pair}</span>`:''}
          ${e.result?`<span style="font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;color:${resultColor};">${e.result}</span>`:''}
        </div>
        <button class="diary-delete-btn" onclick="deleteDiaryEntry(${e.id})"><i class="ti ti-trash"></i></button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
        ${e.risk?`<div><div class="diary-field-label">Риск</div><div class="diary-field-val">${e.risk}</div></div>`:''}
        ${e.profit_target?`<div><div class="diary-field-label">Цель прибыли</div><div class="diary-field-val">${e.profit_target}</div></div>`:''}
        ${e.stop_loss?`<div><div class="diary-field-label">Стоп-лосс</div><div class="diary-field-val">${e.stop_loss}</div></div>`:''}
        ${e.take_profit?`<div><div class="diary-field-label">Тейк-профит</div><div class="diary-field-val">${e.take_profit}</div></div>`:''}
        ${e.entry_desc?`<div style="grid-column:1/-1"><div class="diary-field-label">Вход</div><div class="diary-field-val">${e.entry_desc}</div></div>`:''}
        ${e.emotion_before?`<div><div class="diary-field-label">Эмоции ДО</div><div class="diary-field-val">${e.emotion_before}</div></div>`:''}
        ${e.emotion_after?`<div><div class="diary-field-label">Эмоции ПОСЛЕ</div><div class="diary-field-val">${e.emotion_after}</div></div>`:''}
        ${e.comments?`<div style="grid-column:1/-1"><div class="diary-field-label">Комментарии</div><div class="diary-field-val">${e.comments}</div></div>`:''}
        ${e.reason?`<div style="grid-column:1/-1"><div class="diary-field-label">Причина входа</div><div class="diary-field-val">${e.reason}</div></div>`:''}
        ${e.emotion?`<div><div class="diary-field-label">Эмоция</div><div class="diary-field-val">${e.emotion}</div></div>`:''}
        ${e.notes?`<div style="grid-column:1/-1"><div class="diary-field-label">Заметки</div><div class="diary-field-val">${e.notes}</div></div>`:''}
      </div>
      ${e.screenshot_url?`<img class="diary-entry-img" src="${e.screenshot_url}" ${imgClick} />`:''}
    </div>`;
  }).join('');
}

function initDiaryDrop() {
  const zone = document.getElementById('d-drop-zone');
  if(!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if(file && file.type.startsWith('image/')) {
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('d-img-preview-img').src = ev.target.result;
        document.getElementById('d-img-preview').style.display = 'block';
        zone.style.display = 'none';
        document.getElementById('d-upload-status').textContent = '📎 ' + file.name;
      };
      reader.readAsDataURL(file);
    }
  });
}
// ========== END DIARY ==========
</script>

<div class="img-modal" id="img-modal" onclick="this.classList.remove('open')">
  <img id="img-modal-img" src="" alt="preview" />
</div>

</body>
